# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Requires the Pinned module to be installed first:
#   winget configure --file "https://raw.githubusercontent.com/AppNetOnline/ans-dsc-pinned/master/.configurations/winget-configure.yaml" --accept-configuration-agreements
properties:
  resources:
    - resource: Pinned/App
      id: InstallFirefox
      directives:
        description: Update Firefox to an exact pinned version
      settings:
        Ensure: Present
        Name: Mozilla Firefox (x64 en-US)
        InstallerPath: https://download-installer.cdn.mozilla.net/pub/firefox/releases/150.0.1/win64/en-US/Firefox%20Setup%20150.0.1.msi
        Version: 150.0.1
        Arguments: /quiet REBOOT=ReallySuppress
        PatchOnly: false

  configurationVersion: 0.2.0