# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
# Requires the Pinned module to be installed first
properties:
  resources:
    - resource: Pinned/App
      id: RemoveNotepadPlusPlus
      directives:
        description: Uninstall Notepad++ from the system
      settings:
        Ensure: Absent
        Name: Notepad++ (64-bit x64)
        InstallerPath: ''
        UseUninstallString: true
        ArgumentsForUninstall: /S

  configurationVersion: 0.2.0