# yaml-language-server: $schema=https://aka.ms/configuration-dsc-schema/0.2
properties:
  resources:
    - resource: PSDscResources/Script
      id: InstallPinnedModule
      directives:
        description: Install the Pinned DSC module from GitHub
        allowPrerelease: true
      settings:
        GetScript: |
          $mod = Get-Module -ListAvailable -Name Pinned | Sort-Object Version -Descending | Select-Object -First 1
          @{ Result = if ($mod) { $mod.Version.ToString() } else { '' } }
        TestScript: |
          $mod = Get-Module -ListAvailable -Name Pinned | Sort-Object Version -Descending | Select-Object -First 1
          $mod -and ($mod.Version -ge [version]'4.0.3')
        SetScript: |
          $destinations = @(
              "$env:LOCALAPPDATA\Microsoft\WinGet\Configuration\Modules\Pinned",
              "$env:ProgramFiles\WindowsPowerShell\Modules\Pinned"
          )

          function Copy-PinnedModule {
              param(
                  [Parameter(Mandatory)]
                  [string] $Source,

                  [Parameter(Mandatory)]
                  [string] $Destination
              )

              if (Test-Path $Destination) { Remove-Item $Destination -Recurse -Force }
              New-Item -ItemType Directory -Path $Destination -Force | Out-Null
              $resolvedDestination = (Resolve-Path $Destination).Path.TrimEnd('\')
              Get-ChildItem $Source -Exclude '.git','*.ps1','*.yaml','*.yml','README.md' |
                  Where-Object {
                      $childPath = $_.FullName.TrimEnd('\')
                      -not $resolvedDestination.StartsWith($childPath + '\', [System.StringComparison]::OrdinalIgnoreCase)
                  } |
                  Copy-Item -Destination $Destination -Recurse -Force
          }

          # Try local repo first (when running from a cloned copy); fall back to GitHub download.
          $localRoot = @(
              (Join-Path $PWD.Path 'Pinned'),
              (Join-Path (Split-Path $PWD.Path -Parent) 'Pinned'),
              $PWD.Path
          ) | Where-Object {
              $_ -and (Test-Path (Join-Path $_ 'Pinned.psd1'))
          } | Select-Object -First 1

          if ($localRoot) {
              foreach ($dest in $destinations) {
                  Copy-PinnedModule -Source $localRoot -Destination $dest
              }
          } else {
              $url     = 'https://github.com/AppNetOnline/ans-dsc-pinned/archive/refs/heads/master.zip'
              $tempZip = Join-Path $env:TEMP 'ans-dsc-pinned.zip'
              $tempDir = Join-Path $env:TEMP 'ans-dsc-pinned-extract'
              Invoke-WebRequest -Uri $url -OutFile $tempZip -UseBasicParsing
              if (Test-Path $tempDir) { Remove-Item $tempDir -Recurse -Force }
              Expand-Archive -Path $tempZip -DestinationPath $tempDir -Force
              $root = Get-ChildItem $tempDir -Directory | Select-Object -First 1
              $moduleRoot = Join-Path $root.FullName 'Pinned'
              foreach ($dest in $destinations) {
                  Copy-PinnedModule -Source $moduleRoot -Destination $dest
              }
              Remove-Item $tempZip, $tempDir -Recurse -Force -ErrorAction SilentlyContinue
          }

  configurationVersion: 0.2.0
