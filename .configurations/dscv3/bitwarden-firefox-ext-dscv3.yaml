$schema: https://aka.ms/dsc/schemas/v3/bundled/config/document.json
resources:
  - name: InstallFirefox
    type: AppNetOnline.Pinned/App
    properties:
      Ensure: Present
      Name: Mozilla Firefox (x64 en-US)
      InstallerPath: https://download-installer.cdn.mozilla.net/pub/firefox/releases/150.0.1/win64/en-US/Firefox%20Setup%20150.0.1.msi
      Version: "150.0.1"
      Arguments: /quiet REBOOT=ReallySuppress
      PatchOnly: false

  - name: ForceInstallFirefoxBitwardenExtension
    type: Microsoft.Windows/Registry
    dependsOn:
      - "[resourceId('AppNetOnline.Pinned/App','InstallFirefox')]"
    properties:
      _exist: true
      keyPath: HKLM\SOFTWARE\Policies\Mozilla\Firefox\Extensions\Install
      valueName: "1"
      valueData:
        String: https://addons.mozilla.org/firefox/downloads/latest/bitwarden-password-manager/latest.xpi