#   -- or --
#   winget configure --file "https://raw.githubusercontent.com/AppNetOnline/ans-dsc-pinned/master/.configurations/winget-configure.yaml" --accept-configuration-agreements
properties:
  resources:
    - resource: Pinned/App
      id: RemoveNotepadPlusPlus
      directives:
        description: Remove Notepad++ if it's at the pinned version
        Ensure: Absent
        Name: Notepad++ (64-bit x64)
        Version: 8.9.4

  configurationVersion: 0.2.0
